function getTable(id){ return TABLES.find(t=>t.id===id); }

function tableHeight(t){ return 36 + t.fields.length * 24 + 8; }
function tableWidth(){ return 280; }

function getConnectPoint(t, side){
  const w = tableWidth(), h = tableHeight(t);
  const cx = t.x + w/2, cy = t.y + h/2;
  if(side==='right') return [t.x+w, cy];
  if(side==='left')  return [t.x, cy];
  if(side==='bottom') return [cx, t.y+h];
  if(side==='top')    return [cx, t.y];
  return [cx, cy];
}

function bestSides(from, to){
  const fw = tableWidth(), tw = tableWidth();
  const fcx = from.x+fw/2, fcy = from.y+tableHeight(from)/2;
  const tcx = to.x+tw/2,   tcy = to.y+tableHeight(to)/2;
  const dx = tcx-fcx, dy = tcy-fcy;
  if(Math.abs(dx) > Math.abs(dy)){
    return dx>0 ? ['right','left'] : ['left','right'];
  } else {
    return dy>0 ? ['bottom','top'] : ['top','bottom'];
  }
}

function drawTable(t, dimmed){
  const w = tableWidth(), h = tableHeight(t);
  const color = COLORS[t.group] || COLORS.support;
  const alpha = dimmed ? 0.25 : 1;

  ctx.globalAlpha = alpha;

  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.08)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;

  // Body
  ctx.fillStyle = color.bg;
  ctx.strokeStyle = color.border;
  ctx.lineWidth = 1.5;
  roundRect(t.x, t.y, w, h, 10);
  ctx.fill(); ctx.stroke();

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  // Header
  ctx.fillStyle = color.header;
  roundRect(t.x, t.y, w, 36, [10,10,0,0]);
  ctx.fill();

  // Header text
  ctx.fillStyle = color.headerText;
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(t.id, t.x+w/2, t.y+22);

  // Fields
  t.fields.forEach((f,i)=>{
    const fy = t.y + 36 + 8 + i*24;

    // Alt row
    if(i%2===1){
      ctx.fillStyle = 'rgba(0,0,0,0.03)';
      ctx.fillRect(t.x+1, fy-4, w-2, 24);
    }

    // Key badge
    if(f.key){
      let bColor = '#EBF2FF', bText = '#1A56DB', bBorder = '#1A56DB';
      if(f.key==='UK'){ bColor='#D1FAE5'; bText='#065F46'; bBorder='#059669'; }
      else if(f.key.startsWith('FK')){ bColor='#FEF3C7'; bText='#92400E'; bBorder='#D97706'; }
      ctx.fillStyle = bColor;
      ctx.strokeStyle = bBorder;
      ctx.lineWidth = 0.8;
      roundRect(t.x+8, fy-2, f.key==='PK'?22:24, 14, 3);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = bText;
      ctx.font = 'bold 9px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(f.key.split('→')[0], t.x+8+(f.key==='PK'?11:12), fy+8);
    }

    // Field name
    ctx.fillStyle = color.text;
    ctx.font = '11px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(f.name, t.x+38, fy+9);

    // Field type
    ctx.fillStyle = '#9CA3AF';
    ctx.font = '10px Arial';
    ctx.textAlign = 'right';
    const typeText = f.type.length > 22 ? f.type.substring(0,20)+'…' : f.type;
    ctx.fillText(typeText, t.x+w-8, fy+9);
  });

  ctx.globalAlpha = 1;
}

function drawRelation(rel, dimmed){
  const from = getTable(rel.from);
  const to = getTable(rel.to);
  if(!from||!to) return;

  if(rel.type==='self'){
    // Self-referencing
    const w = tableWidth();
    const sx = from.x+w, sy = from.y+tableHeight(from)/2;
    ctx.globalAlpha = dimmed?0.15:0.7;
    ctx.strokeStyle = '#1A56DB';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5,3]);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx+40, sy);
    ctx.lineTo(sx+40, sy-60);
    ctx.lineTo(sx, sy-60);
    ctx.stroke();
    ctx.setLineDash([]);
    drawArrow(sx+1, sy-60, 'left', dimmed);
    ctx.globalAlpha = 1;
    return;
  }

  const [fs, ts] = bestSides(from, to);
  const [fx, fy] = getConnectPoint(from, fs);
  const [tx, ty] = getConnectPoint(to, ts);

  ctx.globalAlpha = dimmed?0.12:0.65;
  ctx.strokeStyle = '#1A56DB';
  ctx.lineWidth = 1.5;
  ctx.setLineDash(rel.type==='many-one-opt'?[5,3]:[]);

  ctx.beginPath();
  ctx.moveTo(fx, fy);

  // Route with bend
  if(fs==='right'&&ts==='left'){
    const mx = (fx+tx)/2;
    ctx.lineTo(mx, fy); ctx.lineTo(mx, ty); ctx.lineTo(tx, ty);
  } else if(fs==='left'&&ts==='right'){
    const mx = (fx+tx)/2;
    ctx.lineTo(mx, fy); ctx.lineTo(mx, ty); ctx.lineTo(tx, ty);
  } else if(fs==='bottom'&&ts==='top'){
    const my = (fy+ty)/2;
    ctx.lineTo(fx, my); ctx.lineTo(tx, my); ctx.lineTo(tx, ty);
  } else if(fs==='top'&&ts==='bottom'){
    const my = (fy+ty)/2;
    ctx.lineTo(fx, my); ctx.lineTo(tx, my); ctx.lineTo(tx, ty);
  } else {
    ctx.lineTo(tx, ty);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  drawArrow(tx, ty, ts, dimmed);
  ctx.globalAlpha = 1;
}

function drawArrow(x, y, side, dimmed){
  ctx.globalAlpha = dimmed?0.2:0.85;
  ctx.fillStyle = '#1A56DB';
  ctx.beginPath();
  const s = 7;
  if(side==='left'){ ctx.moveTo(x,y); ctx.lineTo(x+s,y-s/2); ctx.lineTo(x+s,y+s/2); }
  else if(side==='right'){ ctx.moveTo(x,y); ctx.lineTo(x-s,y-s/2); ctx.lineTo(x-s,y+s/2); }
  else if(side==='top'){ ctx.moveTo(x,y); ctx.lineTo(x-s/2,y+s); ctx.lineTo(x+s/2,y+s); }
  else if(side==='bottom'){ ctx.moveTo(x,y); ctx.lineTo(x-s/2,y-s); ctx.lineTo(x+s/2,y-s); }
  ctx.closePath();
  ctx.fill();
}

function roundRect(x,y,w,h,r){
  if(typeof r==='number') r=[r,r,r,r];
  ctx.beginPath();
  ctx.moveTo(x+r[0],y);
  ctx.lineTo(x+w-r[1],y); ctx.arcTo(x+w,y,x+w,y+r[1],r[1]);
  ctx.lineTo(x+w,y+h-r[2]); ctx.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
  ctx.lineTo(x+r[3],y+h); ctx.arcTo(x,y+h,x,y+h-r[3],r[3]);
  ctx.lineTo(x,y+r[0]); ctx.arcTo(x,y,x+r[0],y,r[0]);
  ctx.closePath();
}

function getActiveTables(){
  if(activeGroup==='all') return TABLES.map(t=>t.id);
  return GROUPS[activeGroup]||[];
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  const active = getActiveTables();

  // Draw relations first
  RELATIONS.forEach(r=>{
    const fromActive = active.includes(r.from);
    const toActive = active.includes(r.to);
    const dimmed = activeGroup!=='all' && (!fromActive||!toActive);
    drawRelation(r, dimmed);
  });

  // Draw tables
  TABLES.forEach(t=>{
    const dimmed = activeGroup!=='all' && !active.includes(t.id);
    drawTable(t, dimmed);
  });

  ctx.restore();
  document.getElementById('info-scale').textContent = 'Zoom: '+Math.round(scale*100)+'%';
}

function zoom(factor){
  scale *= factor;
  scale = Math.max(0.2, Math.min(3, scale));
  draw();
}

function resetView(){
  scale = 0.75; offsetX = 0; offsetY = 0;
  draw();
}

function highlight(group){
  activeGroup = group;
  document.querySelectorAll('.toolbar button').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+group).classList.add('active');
  draw();
}

// Drag
canvas.addEventListener('mousedown', e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; });
canvas.addEventListener('mousemove', e=>{
  if(!dragging) return;
  offsetX += e.clientX-lastX; offsetY += e.clientY-lastY;
  lastX=e.clientX; lastY=e.clientY;
  draw();
});
canvas.addEventListener('mouseup', ()=>dragging=false);
canvas.addEventListener('mouseleave', ()=>dragging=false);

// Scroll zoom
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const factor = e.deltaY<0?1.1:0.9;
  scale = Math.max(0.2, Math.min(3, scale*factor));
  draw();
}, {passive:false});

// Touch
let lastDist = 0;
canvas.addEventListener('touchstart', e=>{
  if(e.touches.length===1){ dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
  if(e.touches.length===2){ lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); }
});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(e.touches.length===1&&dragging){
    offsetX+=e.touches[0].clientX-lastX; offsetY+=e.touches[0].clientY-lastY;
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; draw();
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    scale=Math.max(0.2,Math.min(3,scale*(d/lastDist))); lastDist=d; draw();
  }
},{passive:false});
canvas.addEventListener('touchend',()=>dragging=false);

window.addEventListener('resize',()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight-160; draw(); });

// Initial center
offsetX = 20;
offsetY = 20;
draw();
</script>
</body>
