<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juara League — Flowchart Document</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f8f9fa;color:#111827}
header{background:#1A56DB;color:#fff;padding:16px 32px;display:flex;align-items:center;gap:12px}
header h1{font-size:20px;font-weight:700;letter-spacing:.5px}
header span{font-size:13px;opacity:.75}
.nav{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 32px;display:flex;gap:8px;flex-wrap:wrap}
.nav button{padding:7px 14px;border:1.5px solid #e5e7eb;background:#fff;border-radius:8px;font-size:12px;cursor:pointer;color:#374151;transition:all .15s;font-family:Arial,sans-serif}
.nav button:hover{border-color:#1A56DB;color:#1A56DB}
.nav button.active{background:#1A56DB;border-color:#1A56DB;color:#fff;font-weight:600}
.legend{display:flex;gap:16px;flex-wrap:wrap;padding:12px 32px;background:#fff;border-bottom:1px solid #e5e7eb;font-size:12px}
.legend-item{display:flex;align-items:center;gap:6px;color:#6b7280}
.legend-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.chart-wrap{padding:24px 32px;overflow-x:auto}
.chart-title{font-size:16px;font-weight:700;color:#111827;margin-bottom:4px}
.chart-meta{font-size:12px;color:#6b7280;margin-bottom:20px}
svg.fc{width:100%;font-family:Arial,sans-serif}
.node-process rect{fill:#EBF2FF;stroke:#1A56DB;stroke-width:1.5}
.node-process text{fill:#0C447C;font-size:13px}
.node-decision polygon{fill:#FEF3C7;stroke:#D97706;stroke-width:1.5}
.node-decision text{fill:#78350F;font-size:12px}
.node-start ellipse,.node-end ellipse{fill:#1A56DB;stroke:#1A56DB}
.node-start text,.node-end text{fill:#fff;font-size:13px;font-weight:600}
.node-ok rect{fill:#D1FAE5;stroke:#059669;stroke-width:1.5}
.node-ok text{fill:#065F46;font-size:13px;font-weight:600}
.node-fail rect{fill:#FEE2E2;stroke:#DC2626;stroke-width:1.5}
.node-fail text{fill:#7F1D1D;font-size:13px}
.node-neutral rect{fill:#F3F4F6;stroke:#9CA3AF;stroke-width:1.5}
.node-neutral text{fill:#374151;font-size:13px}
.node-continue rect{fill:#EDE9FE;stroke:#7C3AED;stroke-width:1.5}
.node-continue text{fill:#4C1D95;font-size:13px;font-weight:600}
.arr{stroke:#6B7280;stroke-width:1.5;fill:none;marker-end:url(#arr)}
.arr-label{font-size:11px;fill:#6B7280}
</style>
</head>

function P(x,y,w,h,label,label2){
  const cx=x+w/2, cy=y+h/2;

}
function D(cx,cy,hw,hh,label,label2){
  const pts=`${cx},${cy-hh} ${cx+hw},${cy} ${cx},${cy+hh} ${cx-hw},${cy}`;
  return `<g class="node-decision"><polygon points="${pts}"/>
  <text text-anchor="middle" dominant-baseline="central" x="${cx}" y="${label2?cy-8:cy}">${label}</text>
  ${label2?`<text text-anchor="middle" dominant-baseline="central" x="${cx}" y="${cy+9}" style="font-size:11px;fill:#92400E">${label2}</text>`:''}
  </g>`;
}
function S(cx,cy,label){return `<g class="node-start"><ellipse cx="${cx}" cy="${cy}" rx="60" ry="22"/><text text-anchor="middle" dominant-baseline="central" x="${cx}" y="${cy}">${label}</text></g>`}
function E(cx,cy,label){return `<g class="node-end"><ellipse cx="${cx}" cy="${cy}" rx="60" ry="22"/><text text-anchor="middle" dominant-baseline="central" x="${cx}" y="${cy}">${label}</text></g>`}
function OK(x,y,w,h,label){const cx=x+w/2,cy=y+h/2;return `<g class="node-ok"><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8"/><text text-anchor="middle" dominant-baseline="central" x="${cx}" y="${cy}">${label}</text></g>`}
function FAIL(x,y,w,h,label){const cx=x+w/2,cy=y+h/2;return `<g class="node-fail"><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8"/><text text-anchor="middle" dominant-baseline="central" x="${cx}" y="${cy}">${label}</text></g>`}
function NEU(x,y,w,h,label){const cx=x+w/2,cy=y+h/2;return `<g class="node-neutral"><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8"/><text text-anchor="middle" dominant-baseline="central" x="${cx}" y="${cy}">${label}</text></g>`}
function CONT(x,y,w,h,label){const cx=x+w/2,cy=y+h/2;return `<g class="node-continue"><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8"/><text text-anchor="middle" dominant-baseline="central" x="${cx}" y="${cy}">${label}</text></g>`}
function L(x1,y1,x2,y2,lbl,lx,ly){return `<line class="arr" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>${lbl?`<text class="arr-label" x="${lx||((x1+x2)/2+5)}" y="${ly||((y1+y2)/2)}">${lbl}</text>`:''}`}
function PATH(d,lbl,lx,ly){return `<path class="arr" d="${d}"/>${lbl?`<text class="arr-label" x="${lx}" y="${ly}">${lbl}</text>`:''}`}

let current = 'fc01';

function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = CHARTS.map(c=>`<button onclick="show('${c.id}')" id="btn_${c.id}" class="${c.id===current?'active':''}">${c.label}</button>`).join('');
}

function show(id){
  current = id;
  const info = CHARTS.find(c=>c.id===id);
  const wrap = document.getElementById('chart-wrap');
  wrap.innerHTML = `<div class="chart-title">${info.label}</div>
    <div class="chart-meta">Aktor: ${info.actor} &nbsp;|&nbsp; ${info.desc}</div>
    ${SVGS[id]}`;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active', b.id==='btn_'+id));
}
